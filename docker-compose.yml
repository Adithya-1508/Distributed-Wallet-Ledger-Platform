services:
  postgres:
    image: postgres:16
    container_name: wallet-postgres
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
    ports:
      - "5434:5432"
    volumes:
      - walletdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    # Kafka-API compatible, no JVM / ZooKeeper -- a fraction of Kafka's RAM, so
    # it fits a free-tier box. App + client code is unchanged (same wire protocol).
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: wallet-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container          # tuned for a single low-resource node
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      # advertise localhost so host clients (the API + workers) can connect
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: wallet-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  airflow:
    # Opt-in: `docker compose --profile airflow up -d`. Runs ISOLATED -- Airflow
    # pins older deps that conflict with the app's SQLAlchemy 2.0, so it can't
    # share the app image. Here it's for authoring/viewing the DAGs (UI :8080);
    # real task execution against the DB is wired via k8s in phase 10.
    image: apache/airflow:2.10.3
    container_name: wallet-airflow
    profiles: ["airflow"]
    command: standalone
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"

volumes:
  walletdata: