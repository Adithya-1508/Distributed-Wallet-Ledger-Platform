          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.events.run_consumer"]
          envFrom:
            - configMapRef: { name: wallet-config }
            - secretRef: { name: wallet-secret }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-analytics-consumer
spec:
  replicas: 1
